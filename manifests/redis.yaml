apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
        # 1. Force Redis to record transactions directly to disk
        command: ["redis-server", "--appendonly", "yes"] 
        # 2. Attach the volume path inside the container environment
        volumeMounts:
        - name: redis-data
          mountPath: /data
      # 3. Mount the physical DigitalOcean PVC to the execution space
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
